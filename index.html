<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dimensions of Expression</title>
    <link rel="stylesheet" href="./src/styles.css?v=1.2.0">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <h1>Dimensions of Expression</h1>
          <div class="taxonomy-search" aria-label="Taxonomy search">
            <div class="taxonomy-search-combobox">
              <input
                id="taxonomySearch"
                type="search"
                placeholder="Search tags"
                autocomplete="off"
                role="combobox"
                aria-autocomplete="list"
                aria-controls="taxonomySearchResults"
                aria-expanded="false"
              >
              <div id="taxonomySearchResults" class="taxonomy-search-results" role="listbox"></div>
            </div>
            <div id="taxonomySearchAction" class="taxonomy-search-action" aria-live="polite">
              <span class="taxonomy-search-hint">Choose a tag to code it</span>
            </div>
            <button id="openCustomTermBtn" class="taxonomy-add-button" type="button" aria-label="Add custom term" title="Add custom term">+</button>
          </div>
        </header>

        <section class="studio-grid">
          <aside class="image-panel" aria-label="Reference image workspace">
            <div class="image-stage" id="imageStage">
              <div class="placeholder">
                <span class="placeholder-mark">→</span>
                <p>Use arrows to browse expressions</p>
              </div>
              <button id="prevImageBtn" class="image-arrow image-arrow-left" type="button" aria-label="Previous image">‹</button>
              <img id="previewImage" alt="">
              <button id="nextImageBtn" class="image-arrow image-arrow-right" type="button" aria-label="Next image">›</button>
              <div class="image-stage-tools">
                <button id="playVideoBtn" class="image-stage-tool" type="button" aria-label="Play linked video" title="Play linked video">
                  <img src="./assets/play_video_icon.png" alt="">
                </button>
                <button id="addImageBtn" class="image-stage-tool image-stage-tool-add" type="button" aria-label="Add image" title="Add image">
                  <img src="./assets/add_image_icon.png" alt="">
                </button>
              </div>
            </div>
            <div class="panel-section">
              <label class="character-filter">
                <span>Character</span>
                <select id="characterFilter">
                  <option value="all">All characters</option>
                </select>
              </label>
              <div class="section-title">
                <h2>Progress</h2>
              </div>
              <div id="moduleChecklist" class="module-checklist"></div>
            </div>
          </aside>

          <section class="coding-panel" aria-label="Expression coding workflow">
            <nav class="steps" aria-label="Workflow steps">
              <button class="step is-active" type="button" data-step="0">Vocabulary</button>
              <button class="step" type="button" data-step="1">Emotion</button>
              <button class="step" type="button" data-step="2">Features Activated</button>
              <button class="step" type="button" data-step="3">Interpret</button>
              <button class="step" type="button" data-step="4">Compare</button>
              <button class="step" type="button" data-step="5">Dashboard</button>
            </nav>

            <form id="readingForm">
              <section class="screen is-active" data-screen="0">
                <div class="screen-head">
                  <h2>Vocabulary</h2>
                </div>
                <div id="taxonomyTabs" class="taxonomy-tabs"></div>
                <div class="bin-workspace">
                  <section class="term-bank" aria-label="Vocabulary terms">
                    <div id="taxonomyGrid" class="taxonomy-grid"></div>
                  </section>
                  <section class="message-bins" aria-label="Expression message bins">
                    <div class="message-bin" data-bin="external">
                      <h3><span>External</span><button class="write-in-button" type="button" data-write-in="external" aria-label="Add external write-in">+</button></h3>
                      <div id="externalBin" class="bin-dropzone"></div>
                    </div>
                    <div class="message-bin" data-bin="internal">
                      <h3><span>Internal</span><button class="write-in-button" type="button" data-write-in="internal" aria-label="Add internal write-in">+</button></h3>
                      <div id="internalBin" class="bin-dropzone"></div>
                    </div>
                  </section>
                </div>
              </section>

              <section class="screen" data-screen="1">
                <div class="screen-head">
                  <h2>Emotion Blend</h2>
                </div>
                <div id="emotionBlend" class="blend-grid"></div>
                <h3 class="emotion-section-title">What just happened</h3>
                <div id="whatJustHappened" class="event-grid"></div>
              </section>

              <section class="screen" data-screen="2">
                <div class="screen-head">
                  <h2>Features Activated</h2>
                </div>
                <div id="signalSliders" class="signal-workspace"></div>
              </section>

              <section class="screen" data-screen="3">
                <div class="screen-head">
                  <h2>Interpretation</h2>
                </div>
                <div class="interpretation-fields">
                  <label class="field">
                    <span>Expression name</span>
                    <input id="expressionName" type="text" placeholder="">
                  </label>
                  <label class="field">
                    <span>Subtext</span>
                    <textarea id="subtext" rows="4" placeholder=""></textarea>
                  </label>
                  <label class="field">
                    <span>Evidence</span>
                    <textarea id="evidence" rows="4" placeholder=""></textarea>
                  </label>
                </div>
              </section>

              <section class="screen" data-screen="4">
                <div class="screen-head">
                  <h2>Compare</h2>
                </div>
                <div class="compare-layout">
                  <div id="readingList" class="reading-list"></div>
                  <div class="summary-panel">
                    <h3>Consensus Shape</h3>
                    <div id="consensus" class="consensus"></div>
                  </div>
                </div>
              </section>

              <section class="screen" data-screen="5">
                <div id="dashboardPanel" class="dashboard-layout"></div>
              </section>

              <div class="form-actions">
                <button id="backBtn" class="ghost-button" type="button">Back</button>
                <button id="nextBtn" class="primary-button" type="button">Next</button>
                <button id="saveBtn" class="primary-button" type="submit">Save reading</button>
              </div>
            </form>
          </section>
        </section>
      </section>
    </main>

    <dialog id="imageUploadDialog" class="image-upload-dialog">
      <form id="imageUploadForm" class="image-upload-form">
        <header>
          <h2>Add image</h2>
          <button id="closeImageUploadBtn" type="button" aria-label="Close">×</button>
        </header>
        <label>
          <span>4 digit PIN</span>
          <input id="imageUploadPin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="off" required>
        </label>
        <label>
          <span>Image</span>
          <input id="imageUploadFile" type="file" accept=".png,.jpg,.jpeg,image/png,image/jpeg" required>
        </label>
        <label>
          <span>Character name</span>
          <input id="imageUploadCharacter" type="text" list="characterSuggestions" autocomplete="off" required>
          <datalist id="characterSuggestions"></datalist>
        </label>
        <label>
          <span>Video link <small>optional</small></span>
          <input id="imageUploadVideo" type="url" inputmode="url" placeholder="https://">
        </label>
        <div id="turnstileWidget" class="turnstile-widget" aria-label="Upload verification"></div>
        <p id="imageUploadStorageNote" class="image-upload-storage-note"></p>
        <p id="imageUploadError" class="image-upload-error" role="alert"></p>
        <button class="primary-button" type="submit">Add to viewer</button>
      </form>
    </dialog>

    <dialog id="customTermDialog" class="custom-term-dialog">
      <form id="customTermForm" class="custom-term-form">
        <header>
          <h2>Add term</h2>
          <button id="closeCustomTermBtn" type="button" aria-label="Close">×</button>
        </header>
        <label>
          <span>Word or phrase</span>
          <input id="customTermValue" type="text" autocomplete="off" required>
        </label>
        <label>
          <span>Term type</span>
          <select id="customTermType">
            <option value="vocabulary">Emotion tag</option>
            <option value="emotion">Emotion slider term</option>
            <option value="event">Interpretive slider term</option>
            <option value="feature">Feature activation</option>
          </select>
        </label>
        <label>
          <span id="customTermPrimaryLabel">Section</span>
          <select id="customTermPrimary"></select>
        </label>
        <label id="customTermSecondaryWrap">
          <span id="customTermSecondaryLabel">Subsection</span>
          <select id="customTermSecondary"></select>
        </label>
        <p id="customTermNote" class="custom-term-note" aria-live="polite"></p>
        <button class="primary-button" type="submit">Add term</button>
      </form>
    </dialog>

    <script src="./src/app.js?v=1.2.8" type="module"></script>
  </body>
</html>

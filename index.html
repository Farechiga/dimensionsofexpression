<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dimensions of Expression </title>
    <link rel="stylesheet" href="./src/styles.css?v=0.7.1">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <h1>Dimensions of Expression</h1>
        </header>

        <section class="studio-grid">
          <aside class="image-panel" aria-label="Reference image workspace">
            <div class="image-stage" id="imageStage">
              <div class="placeholder">
                <span class="placeholder-mark">→</span>
                <p>Use arrows to browse generated expressions</p>
              </div>
              <button id="prevImageBtn" class="image-arrow image-arrow-left" type="button" aria-label="Previous image">‹</button>
              <img id="previewImage" alt="">
              <button id="nextImageBtn" class="image-arrow image-arrow-right" type="button" aria-label="Next image">›</button>
            </div>
            <div class="panel-section">
              <div class="section-title">
                <h2>Progress</h2>
              </div>
              <div id="moduleChecklist" class="module-checklist"></div>
            </div>
          </aside>

          <section class="coding-panel" aria-label="Expression coding workflow">
            <nav class="steps" aria-label="Workflow steps">
              <button class="step is-active" type="button" data-step="0">Vocabulary</button>
              <button class="step" type="button" data-step="1">Emotion</button>
              <button class="step" type="button" data-step="2">Signals</button>
              <button class="step" type="button" data-step="3">Interpret</button>
              <button class="step" type="button" data-step="4">Compare</button>
            </nav>

            <form id="readingForm">
              <section class="screen is-active" data-screen="0">
                <div class="screen-head">
                  <h2>Vocabulary</h2>
                </div>
                <div id="taxonomyTabs" class="taxonomy-tabs"></div>
                <div class="bin-workspace">
                  <section class="term-bank" aria-label="Vocabulary terms">
                    <div id="taxonomyGrid" class="taxonomy-grid"></div>
                  </section>
                  <section class="message-bins" aria-label="Expression message bins">
                    <div class="message-bin" data-bin="external">
                      <h3>External</h3>
                      <div id="externalBin" class="bin-dropzone"></div>
                    </div>
                    <div class="message-bin" data-bin="internal">
                      <h3>Internal</h3>
                      <div id="internalBin" class="bin-dropzone"></div>
                    </div>
                  </section>
                </div>
              </section>

              <section class="screen" data-screen="1">
                <div class="screen-head">
                  <h2>Emotion Blend</h2>
                </div>
                <div id="emotionBlend" class="blend-grid"></div>
              </section>

              <section class="screen" data-screen="2">
                <div class="screen-head">
                  <h2>Facial Signals</h2>
                </div>
                <div id="signalSliders" class="signal-workspace"></div>
              </section>

              <section class="screen" data-screen="3">
                <div class="screen-head">
                  <h2>Interpretation</h2>
                </div>
                <div class="interpretation-fields">
                  <label class="field">
                    <span>Expression name</span>
                    <input id="expressionName" type="text" placeholder="">
                  </label>
                  <label class="field">
                    <span>Subtext</span>
                    <textarea id="subtext" rows="4" placeholder=""></textarea>
                  </label>
                  <label class="field">
                    <span>Evidence</span>
                    <textarea id="evidence" rows="4" placeholder=""></textarea>
                  </label>
                </div>
              </section>

              <section class="screen" data-screen="4">
                <div class="screen-head">
                  <h2>Compare</h2>
                </div>
                <div class="compare-layout">
                  <div id="readingList" class="reading-list"></div>
                  <div class="summary-panel">
                    <h3>Consensus Shape</h3>
                    <div id="consensus" class="consensus"></div>
                  </div>
                </div>
              </section>

              <div class="form-actions">
                <button id="backBtn" class="ghost-button" type="button">Back</button>
                <button id="nextBtn" class="primary-button" type="button">Next</button>
                <button id="saveBtn" class="primary-button" type="submit">Save reading</button>
              </div>
            </form>
          </section>
        </section>
      </section>
    </main>
    <script src="./src/app.js?v=0.7.1" type="module"></script>
  </body>
</html>
